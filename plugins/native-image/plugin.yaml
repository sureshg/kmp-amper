tasks:
  buildNativeImage:
    action: !buildNativeImage
      classpath: ${module.runtimeClasspath}
      mainClass: ${pluginSettings.mainClass}
      output: ${taskOutputDir}/${module.name}
      additionalArgs: ${pluginSettings.additionalArgs}

  runTracingAgent:
    action: !runTracingAgent
      resources: ${module.resources}
      classpath: ${module.runtimeClasspath}
      mainClass: ${pluginSettings.mainClass}

  graalVMCheck:
    action: !graalVMCheck
      moduleName: ${module.name}

checks:
  - performedBy: graalVMCheck
    name: graalVMCheck