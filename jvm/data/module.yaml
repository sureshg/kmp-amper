product:
  type: jvm/app

apply:
  - ../../shared/common.module-template.yaml

settings:
  jvm:
    mainClass: DFrameKt
  kotlin:
    compilerPlugins:
      - id: org.jetbrains.kotlin.dataframe
        dependency: $libs.kotlinx.dataframe.compilerPlugin

dependencies:
  - ../../shared
  - $libs.kotlinx.dataframe.core
  - $libs.slf4j.simple
