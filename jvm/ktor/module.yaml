product:
  type: jvm/app

apply:
  - ../../shared/common.module-template.yaml

settings:
  ktor:
    version: 3.4.2
    enabled: true
  jvm:
    mainClass: AppKt

dependencies:
  - ../../shared
  - $libs.ktor.server.core
  - $libs.ktor.server.di
  - $libs.ktor.server.netty
  - $libs.ktor.server.swagger
  - $libs.ktor.server.routing.openapi
  - $libs.logback.classic
  - $libs.kotlinx.rpc.krpc.ktor.server
  - $libs.kotlinx.rpc.krpc.ktor.client
  - $libs.kotlinx.rpc.krpc.ser.json

test-dependencies:
  - $libs.ktor.server.test.host

plugins:
  native-image:
    enabled: true
    mainClass: AppKt
    additionalArgs:
      - --enable-preview
      - --enable-native-access=ALL-UNNAMED
      - --enable-https
      - --enable-monitoring=jvmstat,threaddump
      - --future-defaults=all
      - -H:+UnlockExperimentalVMOptions
      - -O3
      - -march=native
