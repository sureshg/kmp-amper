name: build

on: [push, pull_request]

env:
  AMPER_BOOTSTRAP_CACHE_DIR: ~/.amper/boot-cache
  # later rename to AMPER_SHARED_CACHE_DIR (see AMPER-5012)
  AMPER_CACHE_ROOT: ~/.amper/shared-cache

jobs:
  test:
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Cache Amper binaries
        uses: actions/cache@v4
        with:
          path: ${{ env.AMPER_BOOTSTRAP_CACHE_DIR }}
          # The Amper distribution and JRE depends on the Amper version and is downloaded by the wrapper, so we hash wrappers.
          # We don't use restore keys to avoid growing this cache. The Amper version changes rarely so it's ok to redownload
          # the JRE when the Amper version changes even if the JRE version didn't change.
          key: amper-boot-${{ runner.os }}-${{ hashFiles('amper', 'amper.bat') }}

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.AMPER_CACHE_ROOT }}/.m2.cache
            ${{ env.AMPER_CACHE_ROOT }}/kotlin
          # The dependencies can be shared between OS-es (even if some rare deps are OS-specific).
          # Even if we download foo-windows.jar and foo-linux.jar on different hosts, they don't step on each other's toes.
          # These deps are rare in the Java/Maven world, so it's still worth reusing all the other deps.
          enableCrossOsArchive: true
          key: amper-shared-dependencies-${{ hashFiles('project.yaml', '**/module.yaml', '**/plugin.yaml', 'amper', 'amper.bat', 'libs.versions.toml') }}
          restore-keys: |
            amper-shared-dependencies-

      - name: Cache downloads (toolchains, JDK list, etc.)
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.AMPER_CACHE_ROOT }}/download.cache
            ${{ env.AMPER_CACHE_ROOT }}/extract.cache
          key: amper-shared-downloads-${{ runner.os }}-${{ hashFiles('project.yaml', '**/module.yaml', '**/plugin.yaml', 'amper', 'amper.bat', 'libs.versions.toml') }}
          restore-keys: |
            amper-shared-downloads-${{ runner.os }}-

      - name: Cache project-specific data (incremental cache and task outputs)
        uses: actions/cache@v4
        with:
          # We need to exclude the logs directory to avoid an ever-growing cache size.
          # /!\ Exclusions can only work in specific ways.
          # See https://github.com/actions/toolkit/issues/713#issuecomment-850321461
          path: |
            build/*
            !build/logs
          key: amper-project-${{ runner.os }}-${{ hashFiles('project.yaml', '**/module.yaml', '**/plugin.yaml', 'amper', 'amper.bat', 'libs.versions.toml') }}
          restore-keys: |
            amper-project-${{ runner.os }}-

      - name: Run tests
        run: ./amper test


#        Runner OS	Cache path
#        ubuntu-latest	~/.cache/JetBrains/Amper
#        macos-latest	$HOME/Library/Caches/JetBrains/Amper
#        windows-latest	%LOCALAPPDATA%\JetBrains\Amper