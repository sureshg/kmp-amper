name: 🔨 Build & Release

on:
  push:
    branches: [ main ]
    tags: [ '*' ]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - LICENSE
  pull_request:
    branches: [ main ]

  workflow_dispatch:
    inputs:
      task:
        description: 'Amper task to run'
        required: false
        default: package
        type: choice
        options:
          - package
          - build

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AMPER_BOOTSTRAP_CACHE_DIR: ${{ github.workspace }}/.amper/boot-cache
  AMPER_SHARED_CACHE_DIR: ${{ github.workspace }}/.amper/shared-cache
  AMPER_TASK: ${{ inputs.task || 'package' }}

jobs:
  build:
    name: 🔨 Build
    runs-on: macos-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: ⚡ Cache Amper bootstrap
        uses: actions/cache@v5
        with:
          path: ${{ env.AMPER_BOOTSTRAP_CACHE_DIR }}
          key: amper-boot-${{ runner.os }}-${{ hashFiles('amper', 'amper.bat') }}

      - name: 🛠️ Cache toolchains & JDKs
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.AMPER_SHARED_CACHE_DIR }}/download.cache
            ${{ env.AMPER_SHARED_CACHE_DIR }}/extract.cache
          key: amper-shared-downloads-${{ runner.os }}-${{ hashFiles('project.yaml', '**/module.yaml', '**/plugin.yaml', 'amper', 'amper.bat', 'libs.versions.toml') }}
          restore-keys: |
            amper-shared-downloads-${{ runner.os }}-

      - name: 📦 Cache Maven & Kotlin dependencies
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.AMPER_SHARED_CACHE_DIR }}/.m2.cache
            ${{ env.AMPER_SHARED_CACHE_DIR }}/kotlin
          enableCrossOsArchive: true
          key: amper-shared-dependencies-${{ hashFiles('project.yaml', '**/module.yaml', '**/plugin.yaml', 'amper', 'amper.bat', 'libs.versions.toml') }}
          restore-keys: |
            amper-shared-dependencies-

      - name: 🗂️ Cache build outputs
        uses: actions/cache@v5
        with:
          path: |
            build/*
            !build/logs
          key: amper-project-${{ runner.os }}-${{ hashFiles('project.yaml', '**/module.yaml', '**/plugin.yaml', 'amper', 'amper.bat', 'libs.versions.toml') }}
          restore-keys: |
            amper-project-${{ runner.os }}-

      - name: 🅺 Extract Kotlin version
        if: env.AMPER_TASK == 'build'
        run: |
          echo "KOTLIN_VERSION=$(grep '^kotlin ' libs.versions.toml | sed 's/.*= *"\(.*\)"/\1/')" >> $GITHUB_ENV

      - name: ⚙️ Cache Kotlin/Native konan toolchains
        if: env.AMPER_TASK == 'build'
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ env.KOTLIN_VERSION }}
          restore-keys: |
            konan-${{ runner.os }}-

      - name: 🏗️ Build
        run: |
          if [ "$AMPER_TASK" = "build" ]; then
            ./amper build -v release
            ./build/tasks/_macos_linkMacosArm64Release/macos.kexe
          else
            ./amper package
          fi

      - name: 🔭 Upload OpenTelemetry traces
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: amper_cli_traces.jsonl
          path: build/logs/amper_*_${{ env.AMPER_TASK }}/telemetry/amper_cli_traces.jsonl
          archive: false
          if-no-files-found: ignore

      - name: ☕ Upload app-jvm
        uses: actions/upload-artifact@v7
        with:
          name: app-jvm.jar
          path: build/tasks/_app_jarJvm/app-jvm.jar
          archive: false
          if-no-files-found: error

      - name: 🐧 Upload linux-x64
        if: env.AMPER_TASK == 'build'
        uses: actions/upload-artifact@v7
        with:
          name: app-linux-x64.zip
          path: build/tasks/_linux_linkLinuxX64Release/linux.kexe
          if-no-files-found: error

      - name: 🐧 Upload linux-arm64
        if: env.AMPER_TASK == 'build'
        uses: actions/upload-artifact@v7
        with:
          name: app-linux-arm64.zip
          path: build/tasks/_linux_linkLinuxArm64Release/linux.kexe
          if-no-files-found: error

      - name: 🍎 Upload macos-arm64
        if: env.AMPER_TASK == 'build'
        uses: actions/upload-artifact@v7
        with:
          name: app-macos-arm64.zip
          path: build/tasks/_macos_linkMacosArm64Release/macos.kexe
          if-no-files-found: error

      - name: 🪟 Upload windows-x64
        if: env.AMPER_TASK == 'build'
        uses: actions/upload-artifact@v7
        with:
          name: app-windows-x64.zip
          path: build/tasks/_windows_linkMingwX64Release/windows.exe
          if-no-files-found: error
