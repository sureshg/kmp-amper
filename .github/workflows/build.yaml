name: 🏗️ Amper Build

on:
  push:
    branches: [ main ]
    tags: [ '*' ]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - LICENSE
  pull_request:
    branches: [ main ]

  workflow_dispatch:

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: 🧪 Amper Build
    runs-on: macos-latest
    env:
      AMPER_BOOTSTRAP_CACHE_DIR: ${{ runner.temp }}/amper/boot-cache
      AMPER_CACHE_ROOT: ${{ runner.temp }}/amper/shared-cache

    steps:
      - name: 🛎️ Check out the source code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: 📦 Cache Amper binaries
        uses: actions/cache@v5
        with:
          path: ${{ env.AMPER_BOOTSTRAP_CACHE_DIR }}
          key: amper-boot-${{ runner.os }}-${{ hashFiles('amper', 'amper.bat') }}

      - name: 🗄️ Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.AMPER_CACHE_ROOT }}/.m2.cache
            ${{ env.AMPER_CACHE_ROOT }}/kotlin
          key: amper-shared-deps-${{ hashFiles('project.yaml', '**/module.yaml', '**/plugin.yaml', 'amper', 'amper.bat', 'libs.versions.toml') }}
          restore-keys: |
            amper-shared-deps-

      - name: ⬇️ Cache downloads (toolchains & JDKs)
        uses: actions/cache@v5
        with:
          path: |
            ${{ env.AMPER_CACHE_ROOT }}/download.cache
            ${{ env.AMPER_CACHE_ROOT }}/extract.cache
          key: amper-shared-downloads-${{ runner.os }}-${{ hashFiles('project.yaml', '**/module.yaml', '**/plugin.yaml', 'amper', 'amper.bat', 'libs.versions.toml') }}
          restore-keys: |
            amper-shared-downloads-${{ runner.os }}-

      - name: ⚡ Cache incremental build outputs
        uses: actions/cache@v5
        with:
          path: |
            build/*
            !build/logs
          key: amper-project-${{ runner.os }}-${{ hashFiles('project.yaml', '**/module.yaml', '**/plugin.yaml', 'amper', 'amper.bat', 'libs.versions.toml') }}
          restore-keys: |
            amper-project-${{ runner.os }}-

      - name: 🚀 Run package
        id: amper-test
        run: ./amper package

      - name: 📤 Upload build artifacts
        if: steps.amper-test.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: app-jvm.jar
          path: |
            build/tasks/_app_jarJvm/app-jvm.jar
          if-no-files-found: error
